<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A0E14"/>
      <stop offset="55%" stop-color="#0D1220"/>
      <stop offset="100%" stop-color="#0A0E14"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.35" r="0.55">
      <stop offset="0%" stop-color="#FF8A3D" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#FF8A3D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="amberText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFB273"/>
      <stop offset="100%" stop-color="#FF8A3D"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.1"/>
    </filter>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#glow)"/>

  <!-- faint grid -->
  <g stroke="#1C2432" stroke-width="1">
    <path d="M0 60 H1200 M0 120 H1200 M0 180 H1200 M0 240 H1200" stroke-opacity="0.35"/>
    <path d="M150 0 V300 M400 0 V300 M700 0 V300 M950 0 V300" stroke-opacity="0.25"/>
  </g>

  <!-- neural constellation, right side -->
  <g stroke="#3A4356" stroke-width="1" opacity="0.8">
    <line x1="760" y1="70" x2="860" y2="110"/>
    <line x1="860" y1="110" x2="950" y2="70"/>
    <line x1="860" y1="110" x2="900" y2="190"/>
    <line x1="950" y1="70" x2="1040" y2="120"/>
    <line x1="900" y1="190" x2="1000" y2="220"/>
    <line x1="1000" y1="220" x2="1090" y2="180"/>
    <line x1="1040" y1="120" x2="1090" y2="180"/>
    <line x1="1040" y1="120" x2="1120" y2="90"/>
    <line x1="760" y1="70" x2="820" y2="180"/>
    <line x1="820" y1="180" x2="900" y2="190"/>
  </g>
  <g fill="#FF8A3D">
    <circle cx="760" cy="70" r="3.2"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="860" cy="110" r="4"><animate attributeName="opacity" values="1;0.4;1" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="950" cy="70" r="3"><animate attributeName="opacity" values="0.5;1;0.5" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="190" r="3.6"><animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="1040" cy="120" r="3.2"><animate attributeName="opacity" values="1;0.5;1" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="1000" cy="220" r="2.8"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="1090" cy="180" r="3.4"><animate attributeName="opacity" values="0.6;1;0.6" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="1120" cy="90" r="2.6"><animate attributeName="opacity" values="0.5;1;0.5" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="820" cy="180" r="2.6"><animate attributeName="opacity" values="0.5;1;0.5" dur="3.3s" repeatCount="indefinite"/></circle>
  </g>

  <!-- left content -->
  <text x="80" y="118" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="46" font-weight="600" fill="#EDEFF3">Mihir Khatri</text>
  <rect x="80" y="134" width="46" height="3" fill="#FF8A3D"/>

  <!-- role cycling, staggered fade groups -->
  <g font-family="'JetBrains Mono', 'Courier New', monospace" font-size="19" fill="url(#amberText)">
    <text x="80" y="175">
      <tspan>ai research</tspan>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.30;0.35" dur="12s" repeatCount="indefinite"/>
    </text>
    <text x="80" y="175" opacity="0">
      <tspan>computer vision</tspan>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.30;0.35" begin="3s" dur="12s" repeatCount="indefinite"/>
    </text>
    <text x="80" y="175" opacity="0">
      <tspan>backend systems</tspan>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.30;0.35" begin="6s" dur="12s" repeatCount="indefinite"/>
    </text>
    <text x="80" y="175" opacity="0">
      <tspan>building zenso</tspan>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.30;0.35" begin="9s" dur="12s" repeatCount="indefinite"/>
    </text>
  </g>

  <text x="80" y="215" font-family="Inter, 'Segoe UI', sans-serif" font-size="14" fill="#7C8598">Sardar Patel Institute of Technology · Computer Science</text>

  <!-- signature: subtle waveform / cursor -->
  <g transform="translate(80,240)">
    <rect x="0" y="0" width="9" height="18" fill="#FF8A3D">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
    <text x="18" y="15" font-family="'JetBrains Mono', monospace" font-size="14" fill="#576076">open to research collaborations</text>
  </g>

  <rect x="0.5" y="0.5" width="1199" height="299" fill="none" stroke="#1C2432" stroke-width="1"/>
</svg>
