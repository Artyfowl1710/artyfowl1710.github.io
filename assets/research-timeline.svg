<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1C2432"/>
      <stop offset="15%" stop-color="#FF8A3D"/>
      <stop offset="50%" stop-color="#FF8A3D"/>
      <stop offset="85%" stop-color="#5EEAD4"/>
      <stop offset="100%" stop-color="#1C2432"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="260" fill="#0A0E14"/>

  <line x1="60" y1="130" x2="1140" y2="130" stroke="url(#line)" stroke-width="2"/>

  <!-- Node 1: TRIBE v2 -->
  <circle cx="180" cy="130" r="7" fill="#0A0E14" stroke="#FF8A3D" stroke-width="2.5"/>
  <text x="180" y="95" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="16" fill="#EDEFF3" font-weight="600">TRIBE v2</text>
  <text x="180" y="118" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" fill="#7C8598">sparse frame ablation</text>
  <text x="180" y="160" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#5EEAD4">16 frames · 0.99 Pearson r</text>
  <text x="180" y="178" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#5EEAD4">7.5x speedup</text>

  <!-- Node 2: Zenso -->
  <circle cx="470" cy="130" r="8" fill="#0A0E14" stroke="#FF8A3D" stroke-width="3"/>
  <text x="470" y="95" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="16" fill="#EDEFF3" font-weight="600">Zenso</text>
  <text x="470" y="118" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" fill="#7C8598">engagement analytics platform</text>
  <text x="470" y="160" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#FFB273">E(t) engagement score</text>
  <text x="470" y="178" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#FFB273">6-module multi-agent architecture</text>

  <!-- Node 3: Ro-SVD -->
  <circle cx="760" cy="130" r="7" fill="#0A0E14" stroke="#5EEAD4" stroke-width="2.5"/>
  <text x="760" y="95" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="16" fill="#EDEFF3" font-weight="600">Ro-SVD</text>
  <text x="760" y="118" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" fill="#7C8598">KV cache compression</text>
  <text x="760" y="160" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#5EEAD4">position-aware, grouped query attn.</text>

  <!-- Node 4: Sentinel -->
  <circle cx="1020" cy="130" r="7" fill="#0A0E14" stroke="#FF8A3D" stroke-width="2.5">
    <animate attributeName="stroke-opacity" values="1;0.4;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <text x="1020" y="95" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="16" fill="#EDEFF3" font-weight="600">Sentinel</text>
  <text x="1020" y="118" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" fill="#7C8598">multi-agent red-teaming</text>
  <text x="1020" y="160" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#FFB273">cross-modal jailbreak · modality gap</text>
  <text x="1020" y="178" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#576076">in progress</text>
</svg>
