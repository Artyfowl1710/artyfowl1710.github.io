<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 — Not Found</title>
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0E14; --text: #E8EAED; --text-dim: #8B93A7; --amber: #FF8A3D; --border: #232A38;
  }
  body {
    margin: 0; min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    background: var(--bg); color: var(--text);
    font-family: 'JetBrains Mono', monospace;
  }
  .code { font-family: 'Space Grotesk', sans-serif; font-size: clamp(72px, 16vw, 160px); color: var(--amber); margin: 0; line-height: 1; }
  p { color: var(--text-dim); margin: 12px 0 28px; }
  a { color: var(--amber); border: 1px solid var(--border); padding: 10px 20px; border-radius: 6px; text-decoration: none; }
  a:hover { border-color: var(--amber); }
</style>
</head>
<body>
  <p class="code">404</p>
  <p>this route returned null.</p>
  <a href="/">cd ~</a>
</body>
</html>
